{% extends 'base.html' %}
{% block title %}Dashboard - Inventory Management System{% endblock %}

{% block content %}
<div class="dashboard">
    <h2>Welcome, {{ user.username }} 👋</h2>
    <p class="subtitle">Here is a quick overview of your inventory.</p>

    <!-- Simple "stat card" showing the total product count,
         calculated in dashboard_view() using Product.objects.count() -->
    <div class="stats-card">
        <h3>Total Products</h3>
        <p class="stat-number">{{ total_products }}</p>
    </div>

    <!-- Navigation buttons as required by the project spec -->
    <div class="dashboard-actions">
        <a href="{% url 'product_list' %}" class="btn btn-primary">View Products</a>
        <a href="{% url 'add_product' %}" class="btn btn-secondary">Add Product</a>
        <a href="{% url 'logout' %}" class="btn btn-danger">Logout</a>
    </div>
</div>
{% endblock %}
