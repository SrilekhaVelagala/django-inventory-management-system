{% extends 'base.html' %}
{% block title %}{{ title }} - Inventory Management System{% endblock %}

{% block content %}
<div class="form-page">
    <!-- {{ title }} is passed from the view, so this SAME template
         is reused for BOTH "Add Product" and "Update Product" pages -
         avoiding duplicate HTML files for two very similar forms. -->
    <h2>{{ title }}</h2>

    <form method="POST" class="styled-form">
        {% csrf_token %}

        <!--
            {{ form.as_p }} tells Django to automatically render
            every field of our ProductForm (see forms.py), each
            wrapped in a <p> tag, complete with <label> and <input>
            elements matching the widgets we defined. This saves us
            from manually writing an <input> for every single field
            (and keeps the form in sync automatically if fields are
            added/removed from the model).
        -->
        {{ form.as_p }}

        <button type="submit" class="btn btn-primary">Save</button>
        <a href="{% url 'product_list' %}" class="btn btn-link">Cancel</a>
    </form>
</div>
{% endblock %}
